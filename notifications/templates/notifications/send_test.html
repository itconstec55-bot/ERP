{% extends 'base/base.html' %}

{% block title %}إرسال اختبار{% endblock %}
{% block page_title %}إرسال إشعار اختبار{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header bg-primary text-white"><i class="fas fa-paper-plane"></i> إرسال اختبار</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label">البريد الإلكتروني</label><input type="email" name="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">الموضوع</label><input type="text" name="subject" class="form-control" value="اختبار إشعار"></div>
                    <div class="mb-3"><label class="form-label">المحتوى</label><textarea name="body" class="form-control" rows="4">هذا اختبار من نظام المحاسبة الإلكترونية</textarea></div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> إرسال</button>
                    <a href="{% url 'notifications:dashboard' %}" class="btn btn-outline-secondary">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
