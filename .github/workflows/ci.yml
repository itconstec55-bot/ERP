name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: accounting
          POSTGRES_PASSWORD: accounting
          POSTGRES_DB: accounting_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov flake8 black

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting with black
        run: |
          black --check --line-length 120 . || echo "::warning::Black formatting issues found"

      - name: Run Django system checks
        env:
          DJANGO_SETTINGS_MODULE: accounting_system.settings
          DATABASE_URL: postgres://accounting:accounting@localhost:5432/accounting_test
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "0"
        run: |
          python manage.py check --deploy

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: accounting_system.settings
          DATABASE_URL: postgres://accounting:accounting@localhost:5432/accounting_test
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "0"
          CI: "true"
        run: |
          pytest --ds=accounting_system.settings --cov=. --cov-report=xml || echo "::warning::No tests configured or tests failed"

  build:
    name: Build & Collect Static
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: accounting_system.settings
          DJANGO_SECRET_KEY: ci-test-secret-key
          DJANGO_DEBUG: "0"
        run: |
          python manage.py collectstatic --noinput --dry-run || python manage.py collectstatic --noinput

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: staticfiles
          path: staticfiles/
          if-no-files-found: ignore

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/erp' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::notice::Staging deploy skipped. Configure DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY/DEPLOY_PATH secrets to enable automatic deployment."
            exit 0
          fi
          echo "Deploying to staging $DEPLOY_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            cd $DEPLOY_PATH
            git pull --ff-only origin develop
            docker compose pull
            docker compose up -d --build
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput
            docker compose ps
          "

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || 22 }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/erp' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (Docker Compose)
        run: |
          if [ -z "$DEPLOY_HOST" ]; then
            echo "::notice::Production deploy skipped. Configure DEPLOY_HOST/DEPLOY_USER/DEPLOY_SSH_KEY/DEPLOY_PATH secrets to enable automatic deployment."
            exit 0
          fi
          echo "Deploying to production $DEPLOY_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            set -e
            cd $DEPLOY_PATH
            git pull --ff-only origin main
            docker compose pull
            docker compose up -d --build
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput
            docker compose ps
          "
