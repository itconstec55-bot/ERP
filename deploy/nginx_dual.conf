# =============================================================================
# deploy/nginx_dual.conf — وكيل عكسي يستمع على عنواني LAN والخارجي معاً
# =============================================================================
# السيناريو الأفضل للإنتاج: Nginx يستمع على الواجهات المطلوبة ويعيد التوجيه
# إلى تطبيق Django (gunicorn) على اللووباك. هذا يعطي ربطاً حقيقياً بعناوين
# محددة، ضغطاً، خدمة ملفات ثابتة، وHTTPS — ويدعم إضافة عنوان بإعادة تحميل بسيطة.
#
# ملاحظة NAT مهمة: إن كان IP الخارجي (196.218.24.45) على الراوتر لا على الخادم،
# فلا تُدرجه هنا؛ بدلاً من ذلك اجعل Nginx يستمع على 192.168.1.31:8012 (أو
# 0.0.0.0:8012) ووجِّه المنفذ من الراوتر إلى 192.168.1.31:8012.
# =============================================================================

upstream accounting_backend {
    server 127.0.0.1:8012;   # gunicorn (انظر deploy/start_backend.bat)
}

server {
    # ربط بعنوانَي LAN والخارجي في آن واحد (يشترط إسناد العناوين لواجهات الجهاز)
    listen 192.168.1.31:8012;
    listen 196.218.24.45:8012;
    server_name _;

    client_max_body_size 20M;

    location /static/ {
        alias J:/2027/accounting_system/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias J:/2027/accounting_system/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://accounting_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect off;
    }
}

# -----------------------------------------------
# بديل عند وجود NAT (IP الخارجي على الراوتر):
#   listen 192.168.1.31:8012;
#   # أو للاستماع على كل الواجهات:
#   listen 0.0.0.0:8012;
# ووجِّه المنفذ 8012 من الراوتر إلى 192.168.1.31:8012.
# -----------------------------------------------
