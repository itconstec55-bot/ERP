# docker-compose.yml
# خيار متين للإنتاج: Postgres + Redis + Gunicorn داخل حاويات معزولة.
# لتشغيل بسيط على جهاز واحد بـ SQLite بدل Postgres، راجع التعليق أسفل قسم web.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accounting
      POSTGRES_USER: accounting
      POSTGRES_PASSWORD: ${DJANGO_DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # منفذ مفتوح على localhost فقط (لإدارة/نقل البيانات من الجهاز نفسه، مش على الشبكة)
    # 5432 مشغول بـ PostgreSQL أصلي على ويندوز، فعَرضناه على 5433 على الماستر.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_DB_ENGINE: postgres
      DJANGO_DB_HOST: db
      DJANGO_DB_PORT: "5432"
      DJANGO_DB_NAME: accounting
      DJANGO_DB_USER: accounting
      DJANGO_DB_PASSWORD: ${DJANGO_DB_PASSWORD:-changeme}
      DJANGO_CELERY_BROKER: redis://redis:6379/0
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,${HOST_IP:-192.168.1.31},${EXTERNAL_IP:-196.218.24.45}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-2}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/accounts/login/"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "${BIND_PORT:-8012}:8012"
    volumes:
      - media:/app/media

volumes:
  pgdata:
  media:

