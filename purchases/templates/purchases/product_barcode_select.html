{% extends "base/base.html" %}

{% block title %}اختيار منتجات للباركود{% endblock %}
{% block page_title %}اختيار منتجات لطباعة الباركود{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-primary text-white"><i class="fas fa-barcode"></i> اختيار المنتجات</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">عدد النسخ لكل منتج</label>
                <input type="number" name="count" class="form-control" value="1" min="1" max="100" style="width:100px;">
            </div>
            <div class="mb-3">
                <label class="form-label">اختر المنتجات:</label>
                <div class="row">
                    {% for p in products %}
                    <div class="col-md-3 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="products" value="{{ p.pk }}" id="p{{ forloop.counter }}">
                            <label class="form-check-label" for="p{{ forloop.counter }}">
                                {{ p.name }} <small class="text-muted">({{ p.code }})</small>
                            </label>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-print"></i> طباعة</button>
            <a href="{% url 'warehouses:product_list' %}" class="btn btn-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
