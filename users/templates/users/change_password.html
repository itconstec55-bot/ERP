{% extends 'base/base.html' %}

{% block title %}تغيير كلمة المرور{% endblock %}
{% block page_title %}تغيير كلمة المرور: {{ edit_user.username }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <i class="fas fa-key"></i> تغيير كلمة المرور
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">كلمة المرور الجديدة</label>
                        <input type="password" name="password" class="form-control" minlength="6" required>
                        <small class="text-muted">6 أحرف على الأقل</small>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-save"></i> تغيير كلمة المرور
                        </button>
                        <a href="{% url 'users:user_list' %}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-right"></i> إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
