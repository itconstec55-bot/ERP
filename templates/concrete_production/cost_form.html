{% extends "base/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}<i class="fas fa-dollar-sign me-2"></i>{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">أمر الإنتاج</label>
                    {{ form.production_order }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">نوع التكلفة</label>
                    {{ form.cost_type }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">المبلغ</label>
                    {{ form.amount }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">التاريخ</label>
                    {{ form.date }}
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label fw-bold">الوصف</label>
                    {{ form.description }}
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-1"></i> حفظ</button>
                <a href="{% url 'concrete_production:cost_list' %}" class="btn btn-secondary btn-lg">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
