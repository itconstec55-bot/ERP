{% extends "base/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}<i class="fas fa-industry me-2"></i>{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">أمر الإنتاج</label>
                    {{ form.production_order }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">الشاحنة</label>
                    {{ form.truck }}
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">الكمية (م³)</label>
                    {{ form.quantity_m3 }}
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">ملاحظات</label>
                    {{ form.notes }}
                </div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-1"></i> حفظ</button>
                <a href="{% url 'concrete_production:batch_list' %}" class="btn btn-secondary btn-lg">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
