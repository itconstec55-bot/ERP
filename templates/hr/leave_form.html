{% extends "base/base.html" %}
{% load crispy_forms_tags %}

{% block title %}طلب إجازة جديد{% endblock %}
{% block page_title %}إنشاء طلب إجازة{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header"><i class="fas fa-calendar-alt"></i> بيانات طلب الإجازة</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
                <a href="{% url 'hr:leave_list' %}" class="btn btn-secondary"><i class="fas fa-arrow-right"></i> رجوع</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
