{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم بنجاح | نظام المحاسبة</title>
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0e27; }
        .reset-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; backdrop-filter: blur(20px); max-width: 440px; width: 100%; padding: 40px 35px; color: #fff; text-align: center; }
        .icon-circle { width: 72px; height: 72px; margin: 0 auto 20px; background: linear-gradient(135deg, rgba(40,167,69,0.3), rgba(0,200,100,0.2)); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-circle i { font-size: 1.8rem; color: #7ddf7d; }
        .btn-login { display: inline-block; padding: 14px 40px; border-radius: 14px; font-weight: 700; background: linear-gradient(135deg, #1e82e6, #0d5bbd); color: #fff; text-decoration: none; margin-top: 15px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(30,130,230,0.35); color: #fff; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="icon-circle"><i class="fas fa-check-circle"></i></div>
        <h2 style="color: #fff;">تم بنجاح</h2>
        <p style="color: rgba(255,255,255,0.6);">تم تغيير كلمة المرور بنجاح. يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.</p>
        <a href="{% url 'login' %}" class="btn-login"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</a>
    </div>
</body>
</html>
