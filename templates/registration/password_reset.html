{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور | نظام المحاسبة</title>
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/cairo.css' %}" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0a0e27; }
        .reset-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; backdrop-filter: blur(20px); max-width: 440px; width: 100%; padding: 40px 35px; color: #fff; }
        .reset-card h2 { text-align: center; margin-bottom: 10px; font-size: 1.4rem; }
        .reset-card .subtitle { text-align: center; color: rgba(255,255,255,0.45); font-size: 0.88rem; margin-bottom: 25px; }
        .form-control { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08); color: #fff; border-radius: 14px; padding: 14px 16px; }
        .form-control:focus { border-color: rgba(30,130,230,0.5); background: rgba(255,255,255,0.07); box-shadow: 0 0 0 4px rgba(30,130,230,0.1); color: #fff; }
        .form-label { color: rgba(255,255,255,0.5); font-size: 0.82rem; font-weight: 600; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 14px; font-weight: 700; background: linear-gradient(135deg, #1e82e6, #0d5bbd); border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(30,130,230,0.35); }
        .back-link { text-align: center; margin-top: 18px; }
        .back-link a { color: rgba(255,255,255,0.45); text-decoration: none; font-size: 0.85rem; }
        .back-link a:hover { color: rgba(255,255,255,0.7); }
        .alert { border-radius: 14px; border: none; background: rgba(220,53,69,0.12); color: #ff8a8a; }
        .icon-circle { width: 72px; height: 72px; margin: 0 auto 20px; background: linear-gradient(135deg, rgba(30,90,220,0.3), rgba(0,180,230,0.2)); border: 2px solid rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-circle i { font-size: 1.8rem; color: rgba(255,255,255,0.9); }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="icon-circle"><i class="fas fa-key"></i></div>
        <h2>إعادة تعيين كلمة المرور</h2>
        <p class="subtitle">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور</p>

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_email" class="form-label">البريد الإلكتروني</label>
                <input type="email" name="email" id="id_email" class="form-control"
                       placeholder="example@email.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> إرسال رابط إعادة التعيين
            </button>
        </form>

        <div class="back-link">
            <a href="{% url 'login' %}"><i class="fas fa-arrow-right"></i> العودة لتسجيل الدخول</a>
        </div>
    </div>
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
